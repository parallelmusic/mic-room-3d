<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room · Mic Placement 3D</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;
  --s1:#0f1114;
  --s2:#13161a;
  --border:#1e2228;
  --border2:#252b33;
  --gold:#d4a84b;
  --blue:#4b9fd4;
  --green:#4bd4a0;
  --red:#d44b4b;
  --text:#c8cdd6;
  --muted:#4a5260;
  --dim:#282e38;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  height:100vh;
  display:grid;
  grid-template-columns:220px 1fr 220px;
  grid-template-rows:40px 1fr;
  grid-template-areas:"topbar topbar topbar" "left views right";
  overflow:hidden;
}

/* TOPBAR */
#topbar{
  grid-area:topbar;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:20px;
}
#topbar h1{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--gold);letter-spacing:.12em;text-transform:uppercase}
#topbar .sep{width:1px;height:18px;background:var(--border2)}
.tb-btn{
  background:none;border:1px solid var(--border2);color:var(--muted);
  font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;
  cursor:pointer;border-radius:2px;transition:all .12s;letter-spacing:.06em;
}
.tb-btn:hover{border-color:var(--gold);color:var(--gold)}
.tb-btn.add-mic{border-color:var(--blue);color:var(--blue)}
.tb-btn.add-mic:hover{background:var(--blue);color:#0a0c0f}
.tb-btn.add-src{border-color:var(--green);color:var(--green)}
.tb-btn.add-src:hover{background:var(--green);color:#0a0c0f}
.tb-btn.del{border-color:var(--red);color:var(--red)}
.tb-btn.del:hover{background:var(--red);color:#0a0c0f}
#topbar .room-dims{margin-left:auto;font-size:10px;color:var(--muted);display:flex;gap:8px;align-items:center}
#topbar .room-dims input{background:var(--s2);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;width:40px;padding:2px 5px;text-align:center;border-radius:2px;outline:none}
#topbar .room-dims input:focus{border-color:var(--gold)}

/* LEFT PANEL */
#left{
  grid-area:left;
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.panel-title{font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);padding:10px 12px 6px;border-bottom:1px solid var(--border)}
.obj-list{flex:1;overflow-y:auto;padding:4px 0}
.obj-item{
  padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;
  border-left:2px solid transparent;transition:all .1s;
}
.obj-item:hover{background:var(--s2)}
.obj-item.selected{background:var(--dim);border-left-color:var(--gold)}
.obj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.obj-name{flex:1;font-size:11px;color:var(--text)}
.obj-type{font-size:9px;color:var(--muted);letter-spacing:.06em}

/* RIGHT PANEL */
#right{
  grid-area:right;
  background:var(--s1);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.props-body{padding:12px;flex:1;overflow-y:auto}
.prop-group{margin-bottom:16px}
.prop-group-title{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:8px}
.prop-row{margin-bottom:8px}
.prop-label{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between}
.prop-label span{color:var(--text)}
.axis-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.axis-input-wrap{display:flex;flex-direction:column;gap:2px}
.axis-lbl{font-size:9px;text-align:center;padding:2px 0;border-radius:2px 2px 0 0;font-weight:500}
.axis-lbl.x{background:#3a1a1a;color:var(--red)}
.axis-lbl.y{background:#1a3a2a;color:var(--green)}
.axis-lbl.z{background:#1a2a3a;color:var(--blue)}
.axis-val{
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text);font-family:'IBM Plex Mono',monospace;
  font-size:11px;padding:4px 6px;text-align:center;width:100%;
  border-radius:0 0 2px 2px;outline:none;
}
.axis-val:focus{border-color:var(--gold)}
.prop-slider-row{display:flex;align-items:center;gap:6px}
.prop-slider-row input[type=range]{flex:1;height:2px;-webkit-appearance:none;background:var(--border2);border-radius:1px;outline:none;cursor:pointer}
.prop-slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--gold);cursor:pointer}
.prop-slider-row .sval{font-size:10px;color:var(--text);width:36px;text-align:right}
.name-input{width:100%;background:var(--s2);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 8px;border-radius:2px;outline:none}
.name-input:focus{border-color:var(--gold)}
select.prop-select{width:100%;background:var(--s2);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 8px;border-radius:2px;outline:none;cursor:pointer}
.empty-props{color:var(--muted);font-size:11px;padding:20px 12px;line-height:1.8}

/* VIEWS */
#views{
  grid-area:views;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:1px;
  background:var(--border);
  overflow:hidden;
}
.view-pane{
  background:var(--bg);
  position:relative;
  overflow:hidden;
}
.view-label{
  position:absolute;top:8px;left:10px;
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);pointer-events:none;z-index:2;
}
.view-axes{
  position:absolute;bottom:8px;right:10px;
  font-size:9px;color:var(--muted);pointer-events:none;z-index:2;
  text-align:right;line-height:1.8;
}
canvas.view-canvas{display:block;width:100%;height:100%}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<div id="topbar">
  <h1>Room · 3D</h1>
  <div class="sep"></div>
  <button class="tb-btn add-mic" onclick="addObject('mic')">+ Microfono</button>
  <button class="tb-btn add-src" onclick="addObject('source')">+ Sorgente</button>
  <button class="tb-btn del" onclick="deleteSelected()">Elimina</button>
  <div class="room-dims">
    <span>Stanza:</span>
    <input id="rW" type="number" value="600" min="100" max="2000" oninput="updateRoom()"> W
    <input id="rD" type="number" value="800" min="100" max="2000" oninput="updateRoom()"> D
    <input id="rH" type="number" value="300" min="100" max="600" oninput="updateRoom()"> H
    <span style="color:var(--muted);font-size:9px">(cm)</span>
  </div>
</div>

<div id="left">
  <div class="panel-title">Oggetti</div>
  <div class="obj-list" id="obj-list"></div>
</div>

<div id="views">
  <!-- TOP -->
  <div class="view-pane" id="pane-top">
    <div class="view-label">Top — X/Z</div>
    <div class="view-axes">X →<br>Z ↓</div>
    <canvas class="view-canvas" id="cv-top"></canvas>
  </div>
  <!-- FRONT -->
  <div class="view-pane" id="pane-front">
    <div class="view-label">Front — X/Y</div>
    <div class="view-axes">X →<br>Y ↑</div>
    <canvas class="view-canvas" id="cv-front"></canvas>
  </div>
  <!-- SIDE -->
  <div class="view-pane" id="pane-side">
    <div class="view-label">Side — Z/Y</div>
    <div class="view-axes">Z →<br>Y ↑</div>
    <canvas class="view-canvas" id="cv-side"></canvas>
  </div>
  <!-- ISO -->
  <div class="view-pane" id="pane-iso">
    <div class="view-label">Isometrica</div>
    <canvas class="view-canvas" id="cv-iso"></canvas>
  </div>
</div>

<div id="right">
  <div class="panel-title">Proprietà</div>
  <div class="props-body" id="props-body">
    <div class="empty-props">Seleziona un oggetto<br>per modificarlo.</div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────────
let room = { w: 600, h: 300, d: 800 }; // cm: width(X), height(Y), depth(Z)
let objects = [];
let selectedId = null;
let idCounter = 0;

const MIC_PATTERNS = ['cardioid','supercardioid','omni','fig-8','hypercardioid'];

function addObject(type) {
  const id = ++idCounter;
  const obj = {
    id,
    type,
    name: type === 'mic' ? `Mic ${id}` : `Source ${id}`,
    x: room.w / 2 + (Math.random()-0.5)*100,
    y: type === 'mic' ? 180 : 100,
    z: room.d / 2 + (Math.random()-0.5)*100,
    pattern: 'cardioid',
    dirH: 0,   // horizontal aim degrees
    dirV: 0,   // vertical tilt degrees
    gain: 0,
  };
  objects.push(obj);
  selectObj(id);
  renderAll();
  updateObjList();
}

function deleteSelected() {
  if (!selectedId) return;
  objects = objects.filter(o => o.id !== selectedId);
  selectedId = null;
  updateObjList();
  updateProps();
  renderAll();
}

function selectObj(id) {
  selectedId = id;
  updateObjList();
  updateProps();
  renderAll();
}

function getSelected() { return objects.find(o => o.id === selectedId); }

// ── OBJ LIST ─────────────────────────────────────────────────────────
function updateObjList() {
  const el = document.getElementById('obj-list');
  el.innerHTML = '';
  objects.forEach(obj => {
    const div = document.createElement('div');
    div.className = 'obj-item' + (obj.id === selectedId ? ' selected' : '');
    div.innerHTML = `
      <div class="obj-dot" style="background:${objColor(obj)}"></div>
      <div class="obj-name">${obj.name}</div>
      <div class="obj-type">${obj.type === 'mic' ? 'MIC' : 'SRC'}</div>`;
    div.onclick = () => selectObj(obj.id);
    el.appendChild(div);
  });
}

function objColor(obj) {
  return obj.type === 'mic' ? '#4b9fd4' : '#4bd4a0';
}

// ── PROPS PANEL ───────────────────────────────────────────────────────
function updateProps() {
  const el = document.getElementById('props-body');
  const obj = getSelected();
  if (!obj) { el.innerHTML = '<div class="empty-props">Seleziona un oggetto<br>per modificarlo.</div>'; return; }

  el.innerHTML = `
    <div class="prop-group">
      <div class="prop-group-title">Nome</div>
      <input class="name-input" value="${obj.name}" oninput="setProp('name', this.value)">
    </div>

    <div class="prop-group">
      <div class="prop-group-title">Posizione (cm)</div>
      <div class="axis-inputs">
        <div class="axis-input-wrap">
          <div class="axis-lbl x">X</div>
          <input class="axis-val" type="number" value="${Math.round(obj.x)}" oninput="setPropClamped('x',+this.value,0,room.w)">
        </div>
        <div class="axis-input-wrap">
          <div class="axis-lbl y">Y</div>
          <input class="axis-val" type="number" value="${Math.round(obj.y)}" oninput="setPropClamped('y',+this.value,0,room.h)">
        </div>
        <div class="axis-input-wrap">
          <div class="axis-lbl z">Z</div>
          <input class="axis-val" type="number" value="${Math.round(obj.z)}" oninput="setPropClamped('z',+this.value,0,room.d)">
        </div>
      </div>
    </div>

    ${obj.type === 'mic' ? `
    <div class="prop-group">
      <div class="prop-group-title">Pattern</div>
      <select class="prop-select" onchange="setProp('pattern',this.value)">
        ${MIC_PATTERNS.map(p => `<option value="${p}" ${obj.pattern===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="prop-group">
      <div class="prop-group-title">Orientamento</div>
      <div class="prop-row">
        <div class="prop-label"><span>Orizzontale (az.)</span><span>${obj.dirH}°</span></div>
        <div class="prop-slider-row">
          <input type="range" min="-180" max="180" value="${obj.dirH}" oninput="setProp('dirH',+this.value);this.previousElementSibling&&(1);updateProps()">
        </div>
      </div>
      <div class="prop-row">
        <div class="prop-label"><span>Verticale (tilt)</span><span>${obj.dirV}°</span></div>
        <div class="prop-slider-row">
          <input type="range" min="-90" max="90" value="${obj.dirV}" oninput="setProp('dirV',+this.value);updateProps()">
        </div>
      </div>
    </div>
    ` : `
    <div class="prop-group">
      <div class="prop-group-title">Gain (dB)</div>
      <div class="prop-slider-row">
        <input type="range" min="-20" max="20" value="${obj.gain}" oninput="setProp('gain',+this.value);updateProps()">
        <div class="sval">${obj.gain}dB</div>
      </div>
    </div>
    `}

    <div class="prop-group" style="margin-top:4px;padding-top:12px;border-top:1px solid var(--border)">
      <div class="prop-group-title" style="color:var(--muted)">Coordinate</div>
      <div style="color:var(--muted);font-size:10px;line-height:2">
        X: <span style="color:var(--red)">${Math.round(obj.x)}</span> cm &nbsp;
        Y: <span style="color:var(--green)">${Math.round(obj.y)}</span> cm &nbsp;
        Z: <span style="color:var(--blue)">${Math.round(obj.z)}</span> cm
      </div>
    </div>
  `;

  // Re-attach range labels (dirH dirV) — simpler: use oninput update
  el.querySelectorAll('input[type=range]').forEach(inp => {
    inp.addEventListener('input', () => { updateProps(); renderAll(); });
  });
}

function setProp(key, val) {
  const obj = getSelected();
  if (!obj) return;
  obj[key] = val;
  updateObjList();
  renderAll();
}

function setPropClamped(key, val, mn, mx) {
  const obj = getSelected();
  if (!obj) return;
  obj[key] = Math.max(mn, Math.min(mx, isNaN(val) ? obj[key] : val));
  renderAll();
}

function updateRoom() {
  room.w = parseInt(document.getElementById('rW').value) || 600;
  room.d = parseInt(document.getElementById('rD').value) || 800;
  room.h = parseInt(document.getElementById('rH').value) || 300;
  renderAll();
}

// ── CANVAS SETUP ──────────────────────────────────────────────────────
const panes = {
  top:   { canvas: document.getElementById('cv-top'),   pane: document.getElementById('pane-top') },
  front: { canvas: document.getElementById('cv-front'), pane: document.getElementById('pane-front') },
  side:  { canvas: document.getElementById('cv-side'),  pane: document.getElementById('pane-side') },
  iso:   { canvas: document.getElementById('cv-iso'),   pane: document.getElementById('pane-iso') },
};

const ctxs = {};
Object.keys(panes).forEach(k => { ctxs[k] = panes[k].canvas.getContext('2d'); });

function resizeAll() {
  Object.keys(panes).forEach(k => {
    const p = panes[k];
    const W = p.pane.clientWidth, H = p.pane.clientHeight;
    p.canvas.width = W * devicePixelRatio;
    p.canvas.height = H * devicePixelRatio;
    p.canvas.style.width = W + 'px';
    p.canvas.style.height = H + 'px';
    ctxs[k].scale(devicePixelRatio, devicePixelRatio);
  });
  renderAll();
}

// ── DRAG ──────────────────────────────────────────────────────────────
// For each 2D view, map screen coords to world coords on the relevant axes
const viewDrag = {};

function setupDrag(viewKey, getWorldXY, setWorldXY) {
  const canvas = panes[viewKey].canvas;
  let dragging = false, dragId = null;

  canvas.addEventListener('mousedown', e => {
    const r = canvas.getBoundingClientRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    const { a, b } = screenToView(viewKey, sx, sy);
    // hit test
    for (let i = objects.length - 1; i >= 0; i--) {
      const obj = objects[i];
      const { pa, pb } = objToView(viewKey, obj);
      if (Math.hypot(pa - a, pb - b) < 12) {
        dragging = true; dragId = obj.id;
        selectObj(obj.id);
        return;
      }
    }
    dragging = false; dragId = null;
  });

  canvas.addEventListener('mousemove', e => {
    if (!dragging || dragId === null) return;
    const obj = objects.find(o => o.id === dragId);
    if (!obj) return;
    const r = canvas.getBoundingClientRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    const { a, b } = screenToView(viewKey, sx, sy);
    applyViewCoords(viewKey, obj, a, b);
    updateProps();
    renderAll();
  });

  canvas.addEventListener('mouseup', () => { dragging = false; dragId = null; });
  canvas.addEventListener('mouseleave', () => { dragging = false; dragId = null; });

  // Touch
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    const sx = t.clientX - r.left, sy = t.clientY - r.top;
    const { a, b } = screenToView(viewKey, sx, sy);
    for (let i = objects.length - 1; i >= 0; i--) {
      const obj = objects[i];
      const { pa, pb } = objToView(viewKey, obj);
      if (Math.hypot(pa - a, pb - b) < 18) {
        dragging = true; dragId = obj.id; selectObj(obj.id); return;
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!dragging || !dragId) return;
    const obj = objects.find(o => o.id === dragId);
    if (!obj) return;
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    const sx = t.clientX - r.left, sy = t.clientY - r.top;
    const { a, b } = screenToView(viewKey, sx, sy);
    applyViewCoords(viewKey, obj, a, b);
    updateProps(); renderAll();
  }, { passive: false });

  canvas.addEventListener('touchend', () => { dragging = false; dragId = null; });
}

// View projection helpers
function getViewSize(viewKey) {
  const p = panes[viewKey];
  return { W: p.pane.clientWidth, H: p.pane.clientHeight };
}

function getViewWorldSize(viewKey) {
  if (viewKey === 'top')   return { wA: room.w, wB: room.d };
  if (viewKey === 'front') return { wA: room.w, wB: room.h };
  if (viewKey === 'side')  return { wA: room.d, wB: room.h };
  return { wA: room.w, wB: room.d };
}

function getViewScale(viewKey) {
  const { W, H } = getViewSize(viewKey);
  const { wA, wB } = getViewWorldSize(viewKey);
  const pad = 32;
  return Math.min((W - pad*2) / wA, (H - pad*2) / wB);
}

function worldToScreen(viewKey, a, b) {
  const { W, H } = getViewSize(viewKey);
  const { wA, wB } = getViewWorldSize(viewKey);
  const sc = getViewScale(viewKey);
  const ox = (W - wA * sc) / 2, oy = (H - wB * sc) / 2;
  return { sx: ox + a * sc, sy: oy + b * sc };
}

function screenToView(viewKey, sx, sy) {
  const { W, H } = getViewSize(viewKey);
  const { wA, wB } = getViewWorldSize(viewKey);
  const sc = getViewScale(viewKey);
  const ox = (W - wA * sc) / 2, oy = (H - wB * sc) / 2;
  return { a: (sx - ox) / sc, b: (sy - oy) / sc };
}

function objToView(viewKey, obj) {
  let a, b;
  if (viewKey === 'top')   { a = obj.x; b = obj.z; }
  if (viewKey === 'front') { a = obj.x; b = room.h - obj.y; }
  if (viewKey === 'side')  { a = obj.z; b = room.h - obj.y; }
  return { pa: a, pb: b };
}

function applyViewCoords(viewKey, obj, a, b) {
  if (viewKey === 'top')   { obj.x = Math.max(0,Math.min(room.w,a)); obj.z = Math.max(0,Math.min(room.d,b)); }
  if (viewKey === 'front') { obj.x = Math.max(0,Math.min(room.w,a)); obj.y = Math.max(0,Math.min(room.h,room.h-b)); }
  if (viewKey === 'side')  { obj.z = Math.max(0,Math.min(room.d,a)); obj.y = Math.max(0,Math.min(room.h,room.h-b)); }
}

['top','front','side'].forEach(k => setupDrag(k));

// ── RENDERING ─────────────────────────────────────────────────────────
const GRID_CM = 100;

function drawView2D(viewKey) {
  const ctx = ctxs[viewKey];
  const { W, H } = getViewSize(viewKey);
  const { wA, wB } = getViewWorldSize(viewKey);
  const sc = getViewScale(viewKey);
  const ox = (W - wA * sc) / 2, oy = (H - wB * sc) / 2;

  ctx.clearRect(0, 0, W, H);

  // BG
  ctx.fillStyle = '#0a0c0f';
  ctx.fillRect(0, 0, W, H);

  // Room fill
  ctx.fillStyle = '#0f1218';
  ctx.fillRect(ox, oy, wA*sc, wB*sc);

  // Grid
  ctx.strokeStyle = '#151a20';
  ctx.lineWidth = 0.5;
  for (let a = 0; a <= wA; a += GRID_CM) {
    ctx.beginPath(); ctx.moveTo(ox + a*sc, oy); ctx.lineTo(ox + a*sc, oy + wB*sc); ctx.stroke();
  }
  for (let b = 0; b <= wB; b += GRID_CM) {
    ctx.beginPath(); ctx.moveTo(ox, oy + b*sc); ctx.lineTo(ox + wA*sc, oy + b*sc); ctx.stroke();
  }

  // Room border
  ctx.strokeStyle = '#2a3040';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(ox, oy, wA*sc, wB*sc);

  // Axis labels (every 100cm)
  ctx.fillStyle = '#2a3040';
  ctx.font = `8px IBM Plex Mono, monospace`;
  ctx.textAlign = 'center';
  for (let a = 0; a <= wA; a += GRID_CM) {
    ctx.fillText(a, ox + a*sc, oy + wB*sc + 10);
  }
  ctx.textAlign = 'right';
  for (let b = 0; b <= wB; b += GRID_CM) {
    ctx.fillText(b, ox - 4, oy + b*sc + 3);
  }

  // Connection lines between mics and sources
  const mics = objects.filter(o => o.type === 'mic');
  const sources = objects.filter(o => o.type === 'source');
  mics.forEach(mic => {
    sources.forEach(src => {
      const mp = objToView(viewKey, mic);
      const sp = objToView(viewKey, src);
      const ms = worldToScreen(viewKey, mp.pa, mp.pb);
      const ss = worldToScreen(viewKey, sp.pa, sp.pb);
      ctx.strokeStyle = '#1a2a1a';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([3, 6]);
      ctx.beginPath(); ctx.moveTo(ms.sx, ms.sy); ctx.lineTo(ss.sx, ss.sy); ctx.stroke();
      ctx.setLineDash([]);
      // distance label
      const dx = mic.x-src.x, dy = mic.y-src.y, dz = mic.z-src.z;
      const d3 = Math.round(Math.sqrt(dx*dx+dy*dy+dz*dz));
      ctx.fillStyle = '#253525';
      ctx.font = '8px IBM Plex Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(d3+'cm', (ms.sx+ss.sx)/2, (ms.sy+ss.sy)/2 - 4);
    });
  });

  // Objects
  objects.forEach(obj => {
    const { pa, pb } = objToView(viewKey, obj);
    const { sx, sy } = worldToScreen(viewKey, pa, pb);
    const sel = obj.id === selectedId;
    const col = objColor(obj);
    const r = sel ? 7 : 5.5;

    // polar pattern (top view only, mics)
    if (viewKey === 'top' && obj.type === 'mic' && obj.pattern !== 'omni') {
      drawPolar2D(ctx, sx, sy, obj.dirH, obj.pattern, col, 40 * sc * 0.4);
    }

    // direction arrow (front/side for mic)
    if ((viewKey === 'front' || viewKey === 'side') && obj.type === 'mic') {
      const tilt = viewKey === 'front' ? -obj.dirV : -obj.dirV;
      const rad = tilt * Math.PI / 180;
      const len = 18 * Math.max(0.5, sc * 0.5);
      ctx.strokeStyle = col + '88';
      ctx.lineWidth = 1;
      ctx.setLineDash([2,4]);
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.sin(rad)*len, sy - Math.cos(rad)*len);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // selection ring
    if (sel) {
      ctx.beginPath(); ctx.arc(sx, sy, r + 5, 0, Math.PI*2);
      ctx.strokeStyle = col + '44'; ctx.lineWidth = 1.5; ctx.stroke();
    }

    // body
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = sel ? col : col + 'cc';
    ctx.fill();
    ctx.strokeStyle = '#0a0c0f'; ctx.lineWidth = 1.5; ctx.stroke();

    // label
    ctx.fillStyle = '#0a0c0f';
    ctx.font = `bold ${Math.max(6, 7)}px IBM Plex Mono, monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(obj.type === 'mic' ? 'M' : 'S', sx, sy + 0.5);
    ctx.textBaseline = 'alphabetic';

    // name
    ctx.fillStyle = sel ? col : col + '99';
    ctx.font = `9px IBM Plex Mono, monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(obj.name, sx, sy - r - 4);
  });
}

function drawPolar2D(ctx, cx, cy, angleDeg, pattern, color, size) {
  const ar = (angleDeg - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(ar);
  ctx.globalAlpha = 0.12;
  ctx.beginPath();
  const steps = 90;
  for (let i = 0; i <= steps; i++) {
    const theta = (i / steps) * Math.PI * 2;
    let r;
    if (pattern === 'cardioid') r = size * 0.5 * (1 + Math.cos(theta));
    else if (pattern === 'supercardioid') r = size * (0.37 + 0.63*Math.cos(theta));
    else if (pattern === 'hypercardioid') r = size * (0.25 + 0.75*Math.cos(theta));
    else if (pattern === 'fig-8') r = size * Math.abs(Math.cos(theta));
    else r = size;
    if (i === 0) ctx.moveTo(r*Math.cos(theta), r*Math.sin(theta));
    else ctx.lineTo(r*Math.cos(theta), r*Math.sin(theta));
  }
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = color; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── ISOMETRIC ────────────────────────────────────────────────────────
function drawIso() {
  const ctx = ctxs.iso;
  const { W, H } = getViewSize('iso');
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0c0f';
  ctx.fillRect(0, 0, W, H);

  const ang = Math.PI / 6; // 30°
  const sc = Math.min(W, H) / Math.max(room.w, room.d, room.h) * 0.55;

  function iso(x, y, z) {
    // x=right, y=up, z=depth
    const px = (x - z) * Math.cos(ang) * sc;
    const py = -(y * sc) + (x + z) * Math.sin(ang) * sc;
    return { sx: W/2 + px, sy: H * 0.62 + py };
  }

  const rw = room.w, rh = room.h, rd = room.d;

  // Room edges
  const corners = [
    [0,0,0],[rw,0,0],[rw,0,rd],[0,0,rd],
    [0,rh,0],[rw,rh,0],[rw,rh,rd],[0,rh,rd],
  ];
  const edges = [
    [0,1],[1,2],[2,3],[3,0],
    [4,5],[5,6],[6,7],[7,4],
    [0,4],[1,5],[2,6],[3,7]
  ];

  // Faces (floor, back walls)
  function fillFace(pts, col) {
    ctx.beginPath();
    pts.forEach((p,i) => { const c = iso(...p); i===0?ctx.moveTo(c.sx,c.sy):ctx.lineTo(c.sx,c.sy); });
    ctx.closePath();
    ctx.fillStyle = col; ctx.fill();
  }

  fillFace([[0,0,0],[rw,0,0],[rw,0,rd],[0,0,rd]], '#0f1318'); // floor
  fillFace([[0,0,0],[rw,0,0],[rw,rh,0],[0,rh,0]], '#0d1015'); // back wall
  fillFace([[0,0,0],[0,0,rd],[0,rh,rd],[0,rh,0]], '#0c0f13'); // left wall

  // Grid on floor
  ctx.strokeStyle = '#151c25';
  ctx.lineWidth = 0.5;
  for (let gx = 0; gx <= rw; gx += GRID_CM) {
    const a = iso(gx,0,0), b = iso(gx,0,rd);
    ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
  }
  for (let gz = 0; gz <= rd; gz += GRID_CM) {
    const a = iso(0,0,gz), b = iso(rw,0,gz);
    ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
  }

  // Edges
  ctx.strokeStyle = '#2a3848';
  ctx.lineWidth = 1;
  edges.forEach(([a,b]) => {
    const ca = iso(...corners[a]), cb = iso(...corners[b]);
    ctx.beginPath(); ctx.moveTo(ca.sx,ca.sy); ctx.lineTo(cb.sx,cb.sy); ctx.stroke();
  });

  // Connection lines
  const mics = objects.filter(o => o.type === 'mic');
  const srcs = objects.filter(o => o.type === 'source');
  mics.forEach(mic => {
    srcs.forEach(src => {
      const mp = iso(mic.x, mic.y, mic.z);
      const sp = iso(src.x, src.y, src.z);
      ctx.strokeStyle = '#1e3020';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([3,7]);
      ctx.beginPath(); ctx.moveTo(mp.sx,mp.sy); ctx.lineTo(sp.sx,sp.sy); ctx.stroke();
      ctx.setLineDash([]);
    });
  });

  // Objects
  objects.forEach(obj => {
    const sel = obj.id === selectedId;
    const col = objColor(obj);
    const p = iso(obj.x, obj.y, obj.z);

    // vertical projection line to floor
    const pf = iso(obj.x, 0, obj.z);
    ctx.strokeStyle = col + '30';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([2, 5]);
    ctx.beginPath(); ctx.moveTo(p.sx,p.sy); ctx.lineTo(pf.sx,pf.sy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(pf.sx, pf.sy, 2, 0, Math.PI*2);
    ctx.fillStyle = col + '30'; ctx.fill();

    if (sel) {
      ctx.beginPath(); ctx.arc(p.sx, p.sy, 11, 0, Math.PI*2);
      ctx.strokeStyle = col + '44'; ctx.lineWidth = 1.5; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(p.sx, p.sy, sel ? 7 : 5.5, 0, Math.PI*2);
    ctx.fillStyle = sel ? col : col + 'cc';
    ctx.fill();
    ctx.strokeStyle = '#0a0c0f'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.fillStyle = '#0a0c0f';
    ctx.font = 'bold 7px IBM Plex Mono, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(obj.type === 'mic' ? 'M' : 'S', p.sx, p.sy + 0.5);
    ctx.textBaseline = 'alphabetic';

    ctx.fillStyle = sel ? col : col + '99';
    ctx.font = '8px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(obj.name, p.sx, p.sy - 11);
  });

  // Axis labels
  ctx.fillStyle = '#c84b4b99';
  ctx.font = '9px IBM Plex Mono, monospace';
  const ax = iso(rw+20, 0, 0); ctx.fillText('X', ax.sx, ax.sy);
  ctx.fillStyle = '#4bd4a099';
  const ay = iso(0, rh+20, 0); ctx.fillText('Y', ay.sx, ay.sy);
  ctx.fillStyle = '#4b9fd499';
  const az = iso(0, 0, rd+20); ctx.fillText('Z', az.sx, az.sy);
}

function renderAll() {
  drawView2D('top');
  drawView2D('front');
  drawView2D('side');
  drawIso();
}

// ── INIT ──────────────────────────────────────────────────────────────
window.addEventListener('resize', resizeAll);
resizeAll();

// Add defaults
addObject('source');
setTimeout(() => {
  const src = objects[0];
  src.x = room.w / 2; src.y = 100; src.z = room.d * 0.3;
  addObject('mic');
  const mic = objects[1];
  mic.x = room.w / 2 - 20; mic.y = 180; mic.z = room.d * 0.6;
  addObject('mic');
  const mic2 = objects[2];
  mic2.x = room.w / 2 + 20; mic2.y = 180; mic2.z = room.d * 0.6;
  selectObj(mic.id);
  renderAll();
}, 50);
</script>
</body>
